<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crónicas del Abismo</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
    :root {
        --bg:#0a0a0f; --bg2:#111118; --bg3:#1a1a24;
        --border:#2a2a3a; --border-glow:#4a3a6a;
        --gold:#c9a84c; --gold-dark:#7a5c1e;
        --red:#c0392b; --red-bright:#e74c3c;
        --green:#27ae60; --blue:#2980b9; --purple:#8e44ad;
        --text:#e8e0d0; --text-dim:#888;
        --selected:#f39c12; --attackable:#e74c3c; --healable:#27ae60;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
        background:var(--bg); color:var(--text);
        font-family:'Crimson Text',Georgia,serif;
        min-height:100vh; display:flex; flex-direction:column; align-items:center;
        background-image:
            radial-gradient(ellipse at 20% 50%,rgba(80,30,100,0.08) 0%,transparent 60%),
            radial-gradient(ellipse at 80% 20%,rgba(180,60,40,0.06) 0%,transparent 50%);
    }
    h1 {
        font-family:'Cinzel',serif; font-size:2rem; font-weight:900;
        letter-spacing:0.15em; color:var(--gold);
        text-shadow:0 0 30px rgba(201,168,76,0.4); padding:16px 0 8px;
    }
    #start-screen { display:flex; flex-direction:column; align-items:center; gap:24px; margin-top:80px; }
    .btn-start {
        font-family:'Cinzel',serif; font-size:1.1rem; letter-spacing:0.1em;
        background:linear-gradient(135deg,#4a1a6a,#2a0a3a); color:var(--gold);
        border:1px solid var(--gold-dark); padding:14px 40px; cursor:pointer; transition:all 0.2s;
    }
    .btn-start:hover { background:linear-gradient(135deg,#6a2a9a,#4a1a6a); box-shadow:0 0 20px rgba(201,168,76,0.3); }
    .game-wrapper { width:100%; max-width:720px; padding:8px 12px 24px; display:flex; flex-direction:column; gap:8px; position:relative; }
    .leader-bar { display:flex; align-items:center; gap:12px; padding:8px 14px; border:1px solid var(--border); background:var(--bg2); font-family:'Cinzel',serif; font-size:0.85rem; }
    .enemy-bar { border-color:rgba(192,57,43,0.4); }
    .player-bar { border-color:rgba(41,128,185,0.4); }
    .leader-label { font-weight:700; letter-spacing:0.05em; flex:1; }
    .leader-hp { font-size:1rem; font-weight:700; }
    .hp-low { color:var(--red-bright); animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .energy-display { color:#f1c40f; }
    .attack-display { color:#e67e22; }
    .turn-display { color:var(--text-dim); font-size:0.75rem; margin-left:auto; }
    .battlefield { display:flex; flex-direction:column; gap:4px; }
    .board-row { display:flex; align-items:center; gap:6px; }
    .row-label { font-family:'Cinzel',serif; font-size:0.6rem; color:var(--text-dim); letter-spacing:0.1em; width:42px; text-align:right; flex-shrink:0; }
    .cell { flex:1; height:80px; border:1px solid var(--border); background:var(--bg2); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:default; transition:all 0.15s; position:relative; overflow:hidden; }
    .cell-filled { cursor:pointer; }
    .cell-empty { opacity:0.4; }
    .cell-player.cell-filled { border-color:rgba(41,128,185,0.5); background:linear-gradient(180deg,#0d1a2a 0%,#0a1020 100%); }
    .cell-player.cell-filled:hover { border-color:var(--blue); box-shadow:inset 0 0 12px rgba(41,128,185,0.2); }
    .cell-enemy.cell-filled { border-color:rgba(192,57,43,0.4); background:linear-gradient(180deg,#2a0d0d 0%,#1a0808 100%); }
    .cell-enemy.cell-filled:hover { border-color:var(--red); }
    .cell-selected { border-color:var(--selected)!important; box-shadow:0 0 16px rgba(243,156,18,0.4)!important; }
    .cell-attackable { border-color:var(--attackable)!important; box-shadow:0 0 12px rgba(231,76,60,0.3)!important; animation:attackable-pulse 0.8s infinite alternate; cursor:crosshair!important; }
    @keyframes attackable-pulse { from{box-shadow:0 0 8px rgba(231,76,60,0.2)} to{box-shadow:0 0 20px rgba(231,76,60,0.5)} }
    .cell-healable { border-color:var(--healable)!important; box-shadow:0 0 12px rgba(39,174,96,0.4)!important; cursor:pointer!important; }
    .troop-name { font-family:'Cinzel',serif; font-size:0.58rem; font-weight:700; letter-spacing:0.03em; text-align:center; line-height:1.2; padding:0 4px; color:var(--text); }
    .troop-stats { display:flex; gap:8px; font-size:0.85rem; margin-top:4px; }
    .atk { color:#e67e22; font-weight:700; }
    .hp  { color:#e74c3c; font-weight:700; }
    .hp-crit { color:#ff4444; animation:pulse 0.5s infinite; }
    .fatigue-tag { position:absolute; top:2px; right:2px; font-size:0.65rem; opacity:0.7; }
    .poison-tag { position:absolute; bottom:2px; right:2px; font-size:0.65rem; color:#2ecc71; }
    .cell-placeholder { color:var(--border); font-size:1.2rem; }
    .divider { display:flex; align-items:center; justify-content:center; padding:4px 0; gap:12px; }
    .divider::before,.divider::after { content:""; flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--border-glow),transparent); }
    .btn-leader { font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.08em; background:var(--bg3); color:var(--text-dim); border:1px solid var(--border); padding:6px 14px; cursor:pointer; transition:all 0.15s; }
    .btn-leader.btn-active { color:var(--gold); border-color:var(--gold-dark); box-shadow:0 0 12px rgba(201,168,76,0.2); cursor:pointer; }
    .btn-leader.btn-active:hover { background:rgba(201,168,76,0.1); }
    .hand-section { margin-top:4px; }
    .hand-label { font-family:'Cinzel',serif; font-size:0.65rem; color:var(--text-dim); letter-spacing:0.1em; margin-bottom:6px; }
    .hand { display:flex; gap:6px; flex-wrap:wrap; }
    .hand-card { width:90px; min-height:110px; border:1px solid var(--border); background:var(--bg3); display:flex; flex-direction:column; align-items:center; padding:6px 4px; cursor:pointer; transition:all 0.15s; position:relative; }
    .card-playable { border-color:rgba(41,128,185,0.6); }
    .card-playable:hover { transform:translateY(-6px); border-color:var(--gold); box-shadow:0 8px 20px rgba(0,0,0,0.5); }
    .card-unaffordable { opacity:0.45; cursor:not-allowed; }
    .card-cost { font-family:'Cinzel',serif; font-size:0.8rem; font-weight:700; color:#f1c40f; align-self:flex-start; }
    .card-name { font-family:'Cinzel',serif; font-size:0.58rem; font-weight:700; text-align:center; line-height:1.3; margin:4px 0; color:var(--text); }
    .card-type { font-size:0.6rem; color:var(--text-dim); letter-spacing:0.05em; text-transform:uppercase; margin-bottom:auto; }
    .card-stats { display:flex; gap:8px; font-size:0.8rem; margin-top:6px; }
    .card-stats span:first-child { color:#e67e22; }
    .card-stats span:last-child  { color:#e74c3c; }
    .controls { display:flex; justify-content:flex-end; align-items:center; padding:4px 0; }
    .btn-end { font-family:'Cinzel',serif; font-size:0.85rem; letter-spacing:0.08em; background:linear-gradient(135deg,#1a3a5a,#0d2040); color:var(--gold); border:1px solid var(--gold-dark); padding:10px 24px; cursor:pointer; transition:all 0.15s; }
    .btn-end:hover { background:linear-gradient(135deg,#2a5a8a,#1a3a6a); box-shadow:0 0 16px rgba(201,168,76,0.2); }
    .enemy-turn-label { font-family:'Cinzel',serif; font-size:0.8rem; color:var(--red-bright); letter-spacing:0.05em; animation:pulse 1s infinite; }
    .log-section { background:var(--bg2); border:1px solid var(--border); padding:8px 12px; max-height:130px; overflow-y:auto; }
    .log-line { font-size:0.78rem; color:var(--text-dim); line-height:1.6; border-bottom:1px solid rgba(255,255,255,0.03); }
    .log-line:first-child { color:var(--text); }
    .game-over-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:100; }
    .game-over-box { background:var(--bg2); border:1px solid var(--gold-dark); padding:48px 64px; display:flex; flex-direction:column; align-items:center; gap:24px; box-shadow:0 0 60px rgba(0,0,0,0.8); }
    .game-over-title { font-family:'Cinzel',serif; font-size:2rem; font-weight:900; color:var(--gold); letter-spacing:0.1em; }
    .btn-restart { font-family:'Cinzel',serif; font-size:0.9rem; letter-spacing:0.08em; background:linear-gradient(135deg,#4a1a6a,#2a0a3a); color:var(--gold); border:1px solid var(--gold-dark); padding:12px 32px; cursor:pointer; }
    .btn-restart:hover { opacity:0.8; }
    .heal-banner { position:fixed; top:12px; left:50%; transform:translateX(-50%); background:rgba(39,174,96,0.9); color:white; font-family:'Cinzel',serif; font-size:0.85rem; letter-spacing:0.05em; padding:10px 24px; z-index:50; box-shadow:0 4px 20px rgba(0,0,0,0.4); }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border-glow); }
</style>
</head>
<body>
<h1>Crónicas del Abismo</h1>
<div id="start-screen">
    <p style="color:var(--text-dim);font-size:1rem;letter-spacing:0.05em;">Roguelike de cartas estratégico</p>
    <button class="btn-start" id="start">⚔ Iniciar Combate</button>
</div>
<div id="app"></div>
<script type="module">
    import { Game } from "./game.js"
    const game = new Game()
    window.game = game
    document.getElementById("start").onclick = () => {
        document.getElementById("start-screen").style.display = "none"
        game.combatSystem.startCombat()
    }
</script>
</body>
</html>
