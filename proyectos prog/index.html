<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crónicas del Abismo</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

    :root {
        --bg: #080810;
        --bg2: #0f0f1a;
        --bg3: #181825;
        --border: #252535;
        --border-glow: #3a2a5a;
        --gold: #c9a84c;
        --gold-dark: #6a4e1a;
        --red: #c0392b;
        --red-bright: #e74c3c;
        --green: #27ae60;
        --blue: #2980b9;
        --purple: #8e44ad;
        --text: #e8e0d0;
        --text-dim: #666;
        --selected: #f39c12;
        --attackable: #e74c3c;
        --healable: #27ae60;
        --placeable: #3498db;
        --spell-target: #9b59b6;
        --sacrifice: #e74c3c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        width: 100%; height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'Crimson Text', Georgia, serif;
        overflow: hidden;
    }

    /* ── PANTALLA DE INICIO ── */
    #start-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 24px;
        background: radial-gradient(ellipse at center, #1a0a2a 0%, #080810 70%);
        z-index: 200;
    }
    #start-screen h1 {
        font-family: 'Cinzel', serif;
        font-size: clamp(2rem, 4vw, 3.5rem);
        font-weight: 900;
        letter-spacing: 0.15em;
        color: var(--gold);
        text-shadow: 0 0 40px rgba(201,168,76,0.5);
    }
    #start-screen p {
        color: var(--text-dim);
        font-size: 1.1rem;
        letter-spacing: 0.08em;
    }
    .btn-start {
        font-family: 'Cinzel', serif;
        font-size: 1.1rem;
        letter-spacing: 0.12em;
        background: linear-gradient(135deg, #4a1a6a, #2a0a3a);
        color: var(--gold);
        border: 1px solid var(--gold-dark);
        padding: 16px 48px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn-start:hover {
        background: linear-gradient(135deg, #6a2a9a, #4a1a6a);
        box-shadow: 0 0 30px rgba(201,168,76,0.3);
    }

    /* ── LAYOUT PRINCIPAL ── */
    #app {
        width: 100vw; height: 100vh;
        display: flex;
        overflow: hidden;
    }

    .game-wrapper {
        width: 100%; height: 100%;
        display: grid;
        grid-template-columns: 200px 1fr 200px;
        gap: 0;
    }

    /* ── PANELES LATERALES ── */
    .side-panel {
        background: var(--bg2);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        height: 100vh;
    }
    .right-panel {
        border-right: none;
        border-left: 1px solid var(--border);
    }
    .panel-title {
        font-family: 'Cinzel', serif;
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        color: var(--gold);
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }

    /* LOG */
    .log-section {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 2px;
    }
    .log-line {
        font-size: 0.72rem;
        color: var(--text-dim);
        line-height: 1.5;
        padding: 2px 4px;
        border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .log-line:first-child { color: var(--text); }
    .log-section::-webkit-scrollbar { width: 3px; }
    .log-section::-webkit-scrollbar-thumb { background: var(--border-glow); }

    /* INFO PANEL */
    .info-content {
        flex: 1;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
    }
    .info-hint {
        font-size: 0.75rem;
        line-height: 1.5;
        padding: 10px;
        border-radius: 2px;
        border: 1px solid var(--border);
    }
    .info-hint.placing { border-color: var(--placeable); background: rgba(52,152,219,0.08); }
    .info-hint.attacking { border-color: var(--attackable); background: rgba(231,76,60,0.08); }
    .info-hint.heal { border-color: var(--healable); background: rgba(39,174,96,0.08); color: var(--green); }
    .info-hint.spell { border-color: var(--spell-target); background: rgba(155,89,182,0.08); color: #b39ddb; }
    .info-hint.sacrifice { border-color: var(--sacrifice); background: rgba(192,57,43,0.1); color: var(--red-bright); }
    .info-hint.neutral { border-color: var(--border); }

    /* ── CENTRO ── */
    .center-panel {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
        padding: 6px 10px;
        gap: 4px;
    }

    /* ── LEADER BARS ── */
    .leader-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 12px;
        border: 1px solid var(--border);
        background: var(--bg2);
        font-family: 'Cinzel', serif;
        font-size: 0.8rem;
        flex-shrink: 0;
    }
    .enemy-bar { border-color: rgba(192,57,43,0.4); }
    .player-bar { border-color: rgba(41,128,185,0.4); }
    .leader-label { font-weight: 700; letter-spacing: 0.05em; }
    .leader-hp { font-size: 0.95rem; font-weight: 700; }
    .hp-low { color: var(--red-bright); animation: pulse 1s infinite; }
    .energy-display { color: #f1c40f; }
    .attack-display { color: #e67e22; }
    .turn-display { color: var(--text-dim); font-size: 0.72rem; }

    /* ── BATTLEFIELD ── */
    .battlefield {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex-shrink: 0;
    }
    .board-row {
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .row-label {
        font-family: 'Cinzel', serif;
        font-size: 0.55rem;
        color: var(--text-dim);
        letter-spacing: 0.1em;
        width: 38px;
        text-align: right;
        flex-shrink: 0;
    }

    /* ── CELDAS ── */
    .cell {
        flex: 1;
        height: 90px;
        border: 1px solid var(--border);
        background: var(--bg2);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: default;
        transition: all 0.12s;
        position: relative;
        overflow: hidden;
        user-select: none;
    }
    .cell-filled { cursor: pointer; }
    .cell-empty { opacity: 0.35; }

    .cell-player.cell-filled {
        border-color: rgba(41,128,185,0.4);
        background: linear-gradient(180deg, #0c1828 0%, #080f1a 100%);
    }
    .cell-player.cell-filled:hover {
        border-color: var(--blue);
        box-shadow: inset 0 0 14px rgba(41,128,185,0.15);
    }
    .cell-enemy.cell-filled {
        border-color: rgba(192,57,43,0.35);
        background: linear-gradient(180deg, #200c0c 0%, #140707 100%);
    }
    .cell-enemy.cell-filled:hover { border-color: var(--red); }

    .cell-selected {
        border-color: var(--selected) !important;
        box-shadow: 0 0 18px rgba(243,156,18,0.4) !important;
    }
    .cell-attackable {
        border-color: var(--attackable) !important;
        box-shadow: 0 0 14px rgba(231,76,60,0.35) !important;
        animation: attackable-pulse 0.8s infinite alternate;
        cursor: crosshair !important;
    }
    .cell-healable {
        border-color: var(--healable) !important;
        box-shadow: 0 0 14px rgba(39,174,96,0.4) !important;
        cursor: pointer !important;
    }
    .cell-placeable {
        border-color: var(--placeable) !important;
        box-shadow: 0 0 14px rgba(52,152,219,0.35) !important;
        cursor: cell !important;
        opacity: 0.9 !important;
        animation: placeable-pulse 1s infinite alternate;
    }
    .cell-spell-target {
        border-color: var(--spell-target) !important;
        box-shadow: 0 0 14px rgba(155,89,182,0.4) !important;
        cursor: pointer !important;
    }
    .cell-sacrifice {
        border-color: #e74c3c !important;
        box-shadow: 0 0 14px rgba(231,76,60,0.4) !important;
        cursor: pointer !important;
        animation: sacrifice-pulse 0.6s infinite alternate;
    }
    .cell-sacrifice-enemy {
        border-color: #8e44ad !important;
        box-shadow: 0 0 14px rgba(142,68,173,0.4) !important;
        cursor: pointer !important;
        animation: sacrifice-pulse 0.6s infinite alternate;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes attackable-pulse { from{box-shadow:0 0 8px rgba(231,76,60,0.2)} to{box-shadow:0 0 22px rgba(231,76,60,0.55)} }
    @keyframes placeable-pulse { from{box-shadow:0 0 8px rgba(52,152,219,0.2)} to{box-shadow:0 0 22px rgba(52,152,219,0.5)} }
    @keyframes sacrifice-pulse { from{opacity:0.7} to{opacity:1} }

    /* ── TROPA EN CELDA ── */
    .troop-name {
        font-family: 'Cinzel', serif;
        font-size: 0.55rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-align: center;
        line-height: 1.2;
        padding: 0 3px;
        color: var(--text);
    }
    .troop-stats {
        display: flex;
        gap: 8px;
        font-size: 0.85rem;
        margin-top: 3px;
    }
    .atk { color: #e67e22; font-weight: 700; }
    .hp  { color: #e74c3c; font-weight: 700; }
    .hp-crit { color: #ff4444; animation: pulse 0.5s infinite; }

    .troop-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 2px;
        justify-content: center;
        margin-top: 2px;
    }
    .tag {
        font-size: 0.6rem;
        padding: 0 2px;
        border-radius: 2px;
        line-height: 1.4;
    }
    .tag-fatigue { color: #aaa; }
    .tag-stun { color: #f1c40f; }
    .tag-poison { color: #2ecc71; }
    .tag-burn { color: #e67e22; }
    .tag-curse { color: #9b59b6; }
    .tag-mark { color: #e74c3c; }
    .tag-used { color: #555; }

    .cell-placeholder { color: var(--border); font-size: 1rem; }
    .placeable-hint { color: var(--placeable); font-size: 1.4rem; opacity: 0.7; }

    /* ── DIVISOR ── */
    .divider {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3px 0;
        gap: 10px;
        flex-shrink: 0;
    }
    .divider::before, .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
    }
    .btn-leader {
        font-family: 'Cinzel', serif;
        font-size: 0.65rem;
        letter-spacing: 0.08em;
        background: var(--bg3);
        color: var(--text-dim);
        border: 1px solid var(--border);
        padding: 5px 12px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
    }
    .btn-leader.btn-active {
        color: var(--gold);
        border-color: var(--gold-dark);
        box-shadow: 0 0 12px rgba(201,168,76,0.2);
        cursor: pointer;
    }
    .btn-leader.btn-active:hover { background: rgba(201,168,76,0.1); }

    /* ── MANO ── */
    .hand-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        margin-top: 4px;
    }
    .hand-label {
        font-family: 'Cinzel', serif;
        font-size: 0.6rem;
        color: var(--text-dim);
        letter-spacing: 0.1em;
        margin-bottom: 5px;
        flex-shrink: 0;
    }
    .hand {
        display: flex;
        gap: 5px;
        overflow-x: auto;
        padding-bottom: 4px;
        flex: 1;
        align-items: flex-start;
    }
    .hand::-webkit-scrollbar { height: 3px; }
    .hand::-webkit-scrollbar-thumb { background: var(--border-glow); }

    .hand-card {
        width: 85px;
        min-width: 85px;
        min-height: 105px;
        border: 1px solid var(--border);
        background: var(--bg3);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 5px 3px;
        cursor: pointer;
        transition: all 0.15s;
        position: relative;
        flex-shrink: 0;
    }
    .card-playable { border-color: rgba(41,128,185,0.5); }
    .card-playable:hover { transform: translateY(-8px); border-color: var(--gold); box-shadow: 0 10px 24px rgba(0,0,0,0.6); }
    .card-unaffordable { opacity: 0.4; cursor: not-allowed; }
    .card-selected {
        border-color: var(--gold) !important;
        box-shadow: 0 0 18px rgba(201,168,76,0.5) !important;
        transform: translateY(-10px) !important;
    }
    .card-spell { border-color: rgba(155,89,182,0.5) !important; }
    .card-spell.card-playable:hover { border-color: #9b59b6 !important; }
    .card-spell.card-selected { border-color: #9b59b6 !important; box-shadow: 0 0 18px rgba(155,89,182,0.5) !important; }

    .card-cost { font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 700; color: #f1c40f; align-self: flex-start; }
    .card-name { font-family: 'Cinzel', serif; font-size: 0.54rem; font-weight: 700; text-align: center; line-height: 1.3; margin: 3px 0; color: var(--text); }
    .card-type { font-size: 0.56rem; color: var(--text-dim); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: auto; }
    .card-stats { display: flex; gap: 8px; font-size: 0.78rem; margin-top: 5px; }
    .card-stats span:first-child { color: #e67e22; }
    .card-stats span:last-child  { color: #e74c3c; }
    .card-spell-icon { font-size: 1.4rem; margin-top: auto; opacity: 0.7; }

    /* ── BOTÓN FIN DE TURNO ── */
    .btn-end {
        font-family: 'Cinzel', serif;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        background: linear-gradient(135deg, #1a3a5a, #0d2040);
        color: var(--gold);
        border: 1px solid var(--gold-dark);
        padding: 8px 20px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
    }
    .btn-end:hover { background: linear-gradient(135deg, #2a5a8a, #1a3a6a); box-shadow: 0 0 16px rgba(201,168,76,0.2); }
    .enemy-turn-label { font-family: 'Cinzel', serif; font-size: 0.75rem; color: var(--red-bright); letter-spacing: 0.05em; animation: pulse 1s infinite; }

    /* ── PREVIEW MODAL ── */
    .preview-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.75);
        display: flex; align-items: center; justify-content: center;
        z-index: 150;
        backdrop-filter: blur(3px);
    }
    .preview-modal {
        background: var(--bg2);
        border: 1px solid var(--gold-dark);
        padding: 28px 32px;
        min-width: 260px;
        max-width: 340px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 30px rgba(201,168,76,0.1);
    }
    .preview-cost {
        font-family: 'Cinzel', serif;
        font-size: 1.2rem;
        font-weight: 700;
        color: #f1c40f;
        align-self: flex-start;
    }
    .preview-name {
        font-family: 'Cinzel', serif;
        font-size: 1.1rem;
        font-weight: 900;
        color: var(--gold);
        text-align: center;
        letter-spacing: 0.05em;
    }
    .preview-type {
        font-size: 0.78rem;
        color: var(--text-dim);
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }
    .preview-stats {
        display: flex;
        gap: 20px;
        font-size: 1.2rem;
        font-weight: 700;
    }
    .preview-atk { color: #e67e22; }
    .preview-hp  { color: #e74c3c; }
    .preview-effect {
        font-size: 0.88rem;
        color: var(--text);
        text-align: center;
        line-height: 1.6;
        border-top: 1px solid var(--border);
        padding-top: 12px;
        font-style: italic;
    }
    .preview-close {
        font-family: 'Cinzel', serif;
        font-size: 0.75rem;
        background: var(--bg3);
        color: var(--text-dim);
        border: 1px solid var(--border);
        padding: 6px 18px;
        cursor: pointer;
        margin-top: 4px;
        transition: all 0.15s;
    }
    .preview-close:hover { border-color: var(--gold-dark); color: var(--gold); }

    /* ── GAME OVER ── */
    .game-over-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.88);
        display: flex; align-items: center; justify-content: center;
        z-index: 200;
    }
    .game-over-box {
        background: var(--bg2);
        border: 1px solid var(--gold-dark);
        padding: 48px 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        box-shadow: 0 0 80px rgba(0,0,0,0.9);
    }
    .game-over-title {
        font-family: 'Cinzel', serif;
        font-size: 2.2rem;
        font-weight: 900;
        color: var(--gold);
        letter-spacing: 0.1em;
    }
    .btn-restart {
        font-family: 'Cinzel', serif;
        font-size: 0.9rem;
        letter-spacing: 0.08em;
        background: linear-gradient(135deg, #4a1a6a, #2a0a3a);
        color: var(--gold);
        border: 1px solid var(--gold-dark);
        padding: 12px 36px;
        cursor: pointer;
        transition: all 0.15s;
    }
    .btn-restart:hover { opacity: 0.8; box-shadow: 0 0 20px rgba(201,168,76,0.2); }
</style>
</head>
<body>

<div id="start-screen">
    <h1>Crónicas del Abismo</h1>
    <p>Roguelike de cartas estratégico</p>
    <button class="btn-start" id="start">⚔ Iniciar Combate</button>
</div>

<div id="app"></div>

<script type="module">
    import { Game } from "./game.js"
    const game = new Game()
    window.game = game
    document.getElementById("start").onclick = () => {
        document.getElementById("start-screen").style.display = "none"
        game.combatSystem.startCombat()
    }
</script>

</body>
</html>
